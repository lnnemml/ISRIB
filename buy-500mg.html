<!DOCTYPE html>
<html lang="en">
<head>
<script src="/scripts/utm-capture.js"></script>
  <script src="/scripts/gtm.js"></script>
  <!-- Reddit Pixel -->
  <script src="/scripts/reddit-pixel.js"></script>
  <script src="/scripts/checkout-tracking-helper.js"></script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adding ISRIB A15 500mg to cart...</title>
  <link rel="icon" type="image/png" href="/images/favicon-32x32.png">
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .loader {
      text-align: center;
      padding: 40px;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0 0 10px;
    }
    p {
      opacity: 0.9;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <h1>Adding ISRIB A15 (500mg) to your cart...</h1>
    <p>Redirecting to secure checkout</p>
  </div>

  <script>
    // ============================================
    // ✅ ПОВНІСТЮ ОНОВЛЕНИЙ КОД З ПІДТРИМКОЮ ADMIN PANEL
    // ============================================
    (function() {
      console.log('[BUY-500MG] 🚀 Initializing direct purchase...');
      
      // ============================================
      // 1. ІНІЦІАЛІЗАЦІЯ DATALAYER (КРИТИЧНО!)
      // ============================================
      window.dataLayer = window.dataLayer || [];
      
      // ============================================
      // 2. ГЕНЕРАЦІЯ TRANSACTION ID
      // ============================================
      function getOrCreateTransactionId() {
        const SESSION_KEY = '_txn_id';
        const TIMESTAMP_KEY = '_txn_timestamp';
        const MAX_AGE = 30 * 60 * 1000; // 30 хвилин
        
        try {
          const stored = sessionStorage.getItem(SESSION_KEY);
          const timestamp = parseInt(sessionStorage.getItem(TIMESTAMP_KEY) || '0');
          
          if (stored && (Date.now() - timestamp) < MAX_AGE) {
            console.log('[TXN] ♻️ Reusing existing ID:', stored);
            return stored;
          }
        } catch(e) {
          console.warn('[TXN] ⚠️ SessionStorage error:', e);
        }
        
        const timestamp = Date.now();
        const random = Math.random().toString(36).substring(2, 9);
        const txnId = `TXN-${timestamp}-${random}`.toUpperCase();
        
        try {
          sessionStorage.setItem(SESSION_KEY, txnId);
          sessionStorage.setItem(TIMESTAMP_KEY, timestamp.toString());
          console.log('[TXN] ✨ Created new ID:', txnId);
        } catch(e) {
          console.warn('[TXN] ⚠️ Cannot save to sessionStorage');
        }
        
        return txnId;
      }
      
      const TRANSACTION_ID = getOrCreateTransactionId();
      
      // ============================================
      // 3. ГЕНЕРАЦІЯ ORDER ID (ДЛЯ ADMIN PANEL)
      // ============================================
      const timestamp = Date.now();
      const random = Math.random().toString(36).substring(2, 9).toUpperCase();
      const ORDER_ID = `ORD-${timestamp}-${random}`;
      
      console.log('[BUY-500MG] 🆔 Generated Order ID:', ORDER_ID);
      
      // ============================================
      // 4. ЗБЕРЕЖЕННЯ ДАНИХ ДЛЯ CHECKOUT
      // ============================================
      try {
        sessionStorage.setItem('_checkout_data', JSON.stringify({
          transaction_id: TRANSACTION_ID,
          order_id: ORDER_ID,
          product: 'ISRIB A15 500mg',
          quantity: '500mg',
          price: 130,
          timestamp: Date.now(),
          purchase_type: 'direct_buy'
        }));
        console.log('[BUY-500MG] 💾 Checkout data saved');
      } catch(e) {
        console.error('[BUY-500MG] ❌ Cannot save checkout data:', e);
      }
      
      // ============================================
      // 5. CART FUNCTIONS
      // ============================================
      function normalizeCartUnits(arr) {
        return (arr || []).map((i) => {
          let grams = Number(i.grams || 0);
          if (i.display) {
            const mgFromLabel = parseQtyToMg(i.display);
            if (mgFromLabel) grams = mgFromLabel;
          }
          return { 
            ...i, 
            grams,
            count: Number(i.count || 1),
            price: Number(i.price || 0)
          };
        });
      }

      function parseQtyToMg(s) {
        if (!s) return 0;
        const t = String(s).toLowerCase().trim();
        const n = parseFloat(t.replace(/[^0-9.]/g, '')) || 0;
        return t.includes('g') && !t.includes('mg') ? Math.round(n * 1000) : Math.round(n);
      }

      function readCart() {
        try { 
          const raw = JSON.parse(localStorage.getItem('isrib_cart') || '[]') || [];
          return normalizeCartUnits(raw);
        } catch { 
          return []; 
        }
      }

      function writeCart(arr) {
        localStorage.setItem('isrib_cart', JSON.stringify(arr || []));
      }

      function addToCart(name, sku, grams, price, display) {
        const cart = readCart();
        const gramsInMg = Number(grams) || 0;
        
        const idx = cart.findIndex(i => 
          i.sku === sku && 
          Number(i.grams) === gramsInMg && 
          Number(i.price) === Number(price)
        );
        
        if (idx >= 0) {
          cart[idx].count = Number(cart[idx].count || 1) + 1;
        } else {
          cart.push({ 
            name, 
            sku, 
            grams: gramsInMg,
            price: Number(price) || 0, 
            display: display || null, 
            count: 1, 
            unit: 'pack' 
          });
        }
        
        writeCart(cart);
      }

      // ============================================
      // 6. ДОДАЄМО ДО КОШИКА
      // ============================================
      addToCart('ISRIB A15', 'isrib-a15', 500, 130, '500mg');
      console.log('[BUY-500MG] ✅ Added to cart');

      // ============================================
      // 7. ЗБЕРІГАЄМО PENDING ORDER ДЛЯ ADMIN PANEL
      // ============================================
      try {
        const urlParams = new URLSearchParams(window.location.search);
        
        const pendingOrderData = {
          order_id: ORDER_ID,
          email: 'pending@direct-buy',  // Буде оновлено в checkout
          timestamp: Date.now(),
          amount: 130,
          subtotal: 130,
          discount: 0,
          promo: '',
          product: '500mg',
          items: [{
            name: 'ISRIB A15',
            sku: 'isrib-a15',
            grams: 500,
            price: 130,
            display: '500mg',
            qty: 1
          }],
          utm_source: urlParams.get('utm_source') || 'direct_buy',
          utm_campaign: urlParams.get('utm_campaign') || 'buy_500mg_link',
          firstName: '',
          lastName: '',
          country: '',
          city: '',
          purchase_flow: 'direct_buy_500mg'
        };
        
        const pendingKey = 'pending_order_' + ORDER_ID;
        localStorage.setItem(pendingKey, JSON.stringify(pendingOrderData));
        
        console.log('[BUY-500MG] 💾 Pending order saved for admin panel:', pendingKey);
        console.log('[BUY-500MG] 📦 Order data:', pendingOrderData);
        
        // Verification
        const verification = localStorage.getItem(pendingKey);
        if (verification) {
          console.log('[BUY-500MG] ✅ Admin panel order verified in localStorage');
        } else {
          console.error('[BUY-500MG] ❌ Admin panel order NOT saved!');
        }
      } catch(e) {
        console.error('[BUY-500MG] ❌ Cannot save pending order:', e);
      }

      // ============================================
      // 8. GA4 EVENT: ADD_TO_CART_DIRECT (HIGH INTENT)
      // ============================================
      
      // ✅ ВАЖЛИВО: Використовуємо setTimeout щоб GTM встиг завантажитись
      setTimeout(function() {
        try {
          console.log('[GA4] 📤 Preparing add_to_cart_direct event...');
          
          window.dataLayer.push({
            event: 'add_to_cart_direct',
            ecommerce: {
              currency: 'USD',
              value: 130,
              items: [{
                item_id: 'isrib-a15',
                item_name: 'ISRIB A15',
                item_variant: '500mg',
                item_category: 'Research Compounds',
                price: 130,
                quantity: 1
              }]
            },
            transaction_id: TRANSACTION_ID,
            order_id: ORDER_ID,
            purchase_intent: 'high',
            event_category: 'ecommerce',
            event_label: 'Direct Buy: ISRIB A15 500mg'
          });
          
          console.log('[GA4] ✅ add_to_cart_direct sent:', {
            product: 'ISRIB A15 500mg',
            value: 130,
            transaction_id: TRANSACTION_ID,
            order_id: ORDER_ID,
            intent: 'high'
          });
          
          // ✅ Додаємо fallback для debug
          console.log('[GA4] dataLayer state:', window.dataLayer);
          
        } catch(e) {
          console.error('[GA4] ❌ add_to_cart_direct failed:', e);
        }
      }, 300); // ✅ Затримка 300ms для завантаження GTM

      // ============================================
      // 9. РЕДІРЕКТ НА CHECKOUT
      // ============================================
      setTimeout(function() {
        console.log('[BUY-500MG] 🔄 Redirecting to checkout...');
        window.location.href = '/checkout.html';
      }, 1000); // ✅ Збільшено до 1000ms щоб GA4 встиг відправити

    })();
  </script>

<!-- Enhanced Analytics -->
<script src="/analytics/analytics-loader.js" defer></script>

</body>
</html>
